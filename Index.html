<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Hierarchy Builder</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #f5f5f0;
            min-height: 100vh;
            padding: 30px 20px;
        }

        .wrap {
            max-width: 780px;
            margin: 0 auto;
        }

        h1 {
            color: #0f172a;
            font-size: 26px;
            margin-bottom: 4px;
        }

        .tag {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            height: 160px;
            padding: 12px;
            font-family: ui-monospace, Consolas, monospace;
            font-size: 13px;
            border: 2px solid #cbd5e1;
            border-radius: 8px;
            background: white;
        }

        textarea:focus {
            outline: none;
            border-color: #0f766e;
        }

        button {
            margin-top: 12px;
            background: #0f766e;
            color: white;
            border: none;
            padding: 11px 26px;
            font-size: 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
        }

        button:hover {
            background: #115e59;
        }

        button:disabled {
            background: #94a3b8;
            cursor: wait;
        }

        #result {
            margin-top: 22px;
        }

        pre {
            background: #0f172a;
            color: #e2e8f0;
            padding: 18px;
            border-radius: 8px;
            overflow-x: auto;
            font-size: 13px;
            font-family: ui-monospace, Consolas, monospace;
            line-height: 1.5;
        }

        .err {
            background: #fef2f2;
            border-left: 4px solid #dc2626;
            color: #7f1d1d;
            padding: 12px 14px;
            border-radius: 6px;
        }
    </style>
</head>

<body>
    <div class="wrap">
        <h1>Hierarchy Builder</h1>
        <p class="tag">Enter node relationships as a JSON array and submit.</p>

        <textarea
            id="txt">["A->B","A->C","B->D","C->E","E->F","X->Y","Y->Z","Z->X","P->Q","Q->R","G->H","G->H","G->I","hello","1->2","A->"]</textarea>
        <br>
        <button id="btn" onclick="hit()">Submit</button>

        <div id="result"></div>
    </div>

    <script>
        const URL = "https://YOUR-BACKEND.onrender.com/bfhl";

        async function hit() {
            const b = document.getElementById('btn');
            const r = document.getElementById('result');
            b.disabled = true;
            b.textContent = 'Processing...';
            r.innerHTML = '';

            let body;
            try {
                body = JSON.parse(document.getElementById('txt').value);
            } catch {
                r.innerHTML = '<div class="err">Invalid JSON — check your brackets and quotes.</div>';
                b.disabled = false;
                b.textContent = 'Submit';
                return;
            }

            try {
                const resp = await fetch(URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ data: body })
                });
                const out = await resp.json();
                r.innerHTML = '<pre>' + JSON.stringify(out, null, 2) + '</pre>';
            } catch (e) {
                r.innerHTML = '<div class="err">Request failed: ' + e.message + '</div>';
            }

            b.disabled = false;
            b.textContent = 'Submit';
        }
    </script>
</body>

</html>
